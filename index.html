<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checksum checker</title>
    <link rel="stylesheet" href="https://ontoware.github.io/checksum/css/style.css">
    <link rel="manifest" href="https://ontoware.github.io/checksum/manifest.json">
    <link rel="icon" type="image/svg+xml" href="https://ontoware.github.io/checksum/img/favicon.svg">
    <link rel="apple-touch-icon" href="https://ontoware.github.io/checksum/img/apple-touch-icon.png"> <!--180-->
    <meta name="description" content="Công cụ hỗ trợ kiểm tra tính toàn vẹn của file dựa trên thuật toán SHA-256.">
    <!--facebook-->
    <meta property="og:title" content="Checksum checker">
    <meta property="og:description"
        content="Công cụ hỗ trợ kiểm tra tính toàn vẹn của file dựa trên thuật toán SHA-256.">
    <meta property="og:image" content="https://ontoware.github.io/checksum/img/thumbnail.png">
    <meta property="og:url" content="https://ontoware.github.io/checksum">
    <meta property="og:type" content="website">
    <!--X-->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Checksum checker">
    <meta name="twitter:description"
        content="Công cụ hỗ trợ kiểm tra tính toàn vẹn của file dựa trên thuật toán SHA-256.">
    <meta name="twitter:image" content="https://ontoware.github.io/checksum/img/thumbnail.png">
</head>
<body>

<div class="theme-toggle" id="themeToggle">🌙</div>

<div class="container">
    <h2>Kiểm tra checksum của file</h2>

    <input type="text" id="checksumInput" placeholder="Nhập checksum gốc (SHA-256)">

    <label class="upload-box" id="dropZone">
        <input type="file" id="fileInput">
        <span>Kéo thả file vào đây hoặc bấm để chọn…</span>
    </label>

    <button id="calcBtn">Tính checksum (SHA-256)</button>

    <div id="resultBox" class="hidden">
        <h3>Kết quả:</h3>
        <pre id="hashResult"></pre>
    </div>
</div>

<footer>Powered by Nguyenhx &copy; 2026<span id="year"></span></footer>

<script src="https://ontoware.github.io/checksum/js/script.js"></script>
<script>
    let curYear = new Date().getFullYear();
    if(curYear > 2026){
        document.getElementById("year").textContent = ` - ${curYear}`;
    }
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("https://ontoware.github.io/checksum/js/service-worker.js");
    }
</script>
</body>
</html>
